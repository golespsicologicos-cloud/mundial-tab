<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Bracket en Vivo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0020;color:#fff;font-family:'Barlow Condensed',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(120,0,255,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(0,100,255,.12) 0%,transparent 60%);pointer-events:none;z-index:0;}
.wrapper{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
.deco{height:6px;background:linear-gradient(90deg,#ff3366,#ff9900,#ffdd00,#33cc66,#3399ff,#9933ff,#ff3366);background-size:200% 100%;animation:rainbow 3s linear infinite;}
@keyframes rainbow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.header{text-align:center;padding:16px 16px 10px;background:linear-gradient(180deg,rgba(30,0,80,.95) 0%,transparent 100%);}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5vw,48px);letter-spacing:6px;color:transparent;background:linear-gradient(135deg,#ffdd00,#ff9900,#ffdd00);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,200,0,.4));line-height:1;}
.hsub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin-top:3px;}
.hbadges{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:8px;}
.live-b{display:inline-flex;align-items:center;gap:6px;border:1px solid #ff3366;border-radius:3px;padding:4px 14px;font-size:10px;font-weight:800;color:#ff3366;letter-spacing:2px;text-transform:uppercase;background:rgba(255,51,102,.08);}
.ldot{width:6px;height:6px;border-radius:50%;background:#ff3366;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.upd{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;}
.tabs{display:flex;justify-content:center;gap:5px;padding:8px 12px;}
.tab{padding:6px 18px;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);cursor:pointer;border:1px solid rgba(255,255,255,.08);border-radius:3px;background:transparent;transition:all .2s;}
.tab.active{color:#ffdd00;border-color:#ffdd00;background:rgba(255,221,0,.06);box-shadow:0 0 12px rgba(255,221,0,.12);}
.section{display:none;flex:1;}.section.active{display:block;}

/* BRACKET */
.bracket-outer{padding:14px 8px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.phase-lbl{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(12px,2vw,16px);letter-spacing:3px;color:rgba(255,221,0,.65);margin-bottom:12px;text-transform:uppercase;}
.bracket-layout{display:grid;grid-template-columns:2fr 1.1fr 0.7fr 90px 0.7fr 1.1fr 2fr;gap:0;min-width:820px;align-items:center;min-height:560px;}
.round-col{display:flex;flex-direction:column;height:100%;}
.round-title{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid;}
.rt-r32{color:#ff9900;border-color:rgba(255,153,0,.3);}
.rt-qf{color:#ff6633;border-color:rgba(255,102,51,.3);}
.rt-sf{color:#ff3366;border-color:rgba(255,51,102,.3);}
.round-slots{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:6px 0;}
.match-wrap{padding:3px 5px;}
.mc{flex:1;background:linear-gradient(135deg,rgba(255,153,0,.07),rgba(255,51,102,.04));border:1px solid rgba(255,153,0,.28);border-radius:6px;overflow:hidden;position:relative;transition:all .2s;}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ff9900,#ff3366);opacity:.5;}
.mc:hover{border-color:rgba(255,221,0,.45);box-shadow:0 0 14px rgba(255,221,0,.08);}
.mc.future{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);}
.mc.future::before{display:none;}
.mc-hdr{padding:3px 8px;font-size:7px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,153,0,.45);background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04);}
.mc-team{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px;}
.mc-team:last-child{border-bottom:none;}
.mc-team.tbd{opacity:.22;}
.mc-flag{font-size:19px;line-height:1;width:24px;text-align:center;flex-shrink:0;}
.mc-info{flex:1;min-width:0;}
.mc-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-meta{font-size:8px;color:rgba(255,255,255,.32);margin-top:1px;}
.mc-badge{font-size:7px;font-weight:900;padding:2px 5px;border-radius:2px;flex-shrink:0;letter-spacing:.3px;}
.b1{background:rgba(255,221,0,.18);color:#ffdd00;}
.b2{background:rgba(51,204,102,.13);color:#33cc66;}
.b3{background:rgba(51,153,255,.13);color:#3399ff;}
.mc-vs{text-align:center;font-size:7px;font-weight:900;color:rgba(255,153,0,.28);padding:1px;background:rgba(0,0,0,.15);letter-spacing:2px;}
.ef-row{display:flex;align-items:center;padding:8px 9px;border-bottom:1px solid rgba(255,255,255,.03);gap:6px;}
.ef-row:last-child{border-bottom:none;}
.ef-f{width:20px;height:14px;background:rgba(255,255,255,.04);border-radius:2px;}
.ef-n{height:7px;background:rgba(255,255,255,.04);border-radius:2px;flex:1;}

/* CENTER */
.center-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:6px;}
.trophy-icon{font-size:clamp(32px,4vw,48px);filter:drop-shadow(0 0 18px rgba(255,200,0,.7));animation:glow 2s ease-in-out infinite alternate;}
@keyframes glow{0%{filter:drop-shadow(0 0 12px rgba(255,200,0,.6))}100%{filter:drop-shadow(0 0 24px rgba(255,200,0,.95))}}
.trophy-lbl{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:#ffdd00;margin-top:2px;}
.final-match{width:100%;}

/* THIRDS */
.thirds-outer{padding:0 10px 14px;}
.thirds-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#3399ff;margin-bottom:7px;text-transform:uppercase;}
.thirds-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
@media(max-width:460px){.thirds-grid{grid-template-columns:1fr;}}
.tc{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:5px;border:1px solid;}
.tc.in{background:rgba(51,204,102,.06);border-color:rgba(51,204,102,.2);}
.tc.out{background:rgba(255,51,102,.04);border-color:rgba(255,51,102,.14);opacity:.52;}
.tc-rank{font-size:11px;font-weight:900;width:16px;flex-shrink:0;}
.tc-flag{font-size:18px;}
.tc-info{flex:1;min-width:0;}
.tc-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-grp{font-size:9px;color:rgba(255,255,255,.3);}
.tc-right{text-align:right;flex-shrink:0;}
.tc-pts{font-size:11px;font-weight:800;color:#ffdd00;}
.tc-gd{font-size:9px;color:rgba(255,255,255,.28);}
.tc-badge{font-size:7px;font-weight:900;padding:2px 6px;border-radius:2px;white-space:nowrap;letter-spacing:.3px;}
.tb-in{background:rgba(51,204,102,.18);color:#33cc66;}
.tb-out{background:rgba(255,51,102,.14);color:#ff3366;}

/* GROUPS */
.groups-sec{padding:12px 10px;}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(max-width:480px){.ggrid{grid-template-columns:1fr;}}
.gcard{background:rgba(255,255,255,.025);border:1px solid rgba(255,153,0,.14);border-radius:6px;overflow:hidden;}
.gheader{padding:6px 10px;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#ff9900;background:rgba(255,153,0,.07);border-bottom:1px solid rgba(255,153,0,.09);}
.gtable{width:100%;border-collapse:collapse;}
.gtable th{font-size:9px;color:rgba(255,255,255,.22);font-weight:700;padding:4px 8px;text-align:right;}
.gtable th:first-child{text-align:left;}
.gtable td{padding:5px 8px;font-size:11px;text-align:right;border-top:1px solid rgba(255,255,255,.03);}
.gtable td:first-child{text-align:left;}
.tcell{display:flex;align-items:center;gap:5px;}
.rnk{width:13px;height:13px;border-radius:3px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.r1{background:rgba(255,221,0,.18);color:#ffdd00;}
.r2{background:rgba(51,204,102,.13);color:#33cc66;}
.r3{background:rgba(51,153,255,.09);color:#3399ff;}
.r4{background:rgba(255,255,255,.04);color:rgba(255,255,255,.22);}
.pts-c{font-weight:800;color:#ffdd00;}
.qrow{background:rgba(51,204,102,.03);}
.t3row{background:rgba(51,153,255,.03);}

/* SCORES */
.scores-sec{padding:12px 10px;display:flex;flex-direction:column;gap:6px;}
.scard{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:9px 11px;display:flex;align-items:center;gap:9px;}
.scard.live-g{border-color:rgba(255,51,102,.35);box-shadow:0 0 10px rgba(255,51,102,.08);}
.steams{flex:1;}
.srow{display:flex;align-items:center;gap:7px;padding:2px 0;}
.sflag{font-size:17px;}
.sname{flex:1;font-size:12px;font-weight:600;}
.sname.w{font-weight:800;}
.snum{font-size:17px;font-weight:900;min-width:16px;text-align:right;color:#ffdd00;}
.ssep{height:1px;background:rgba(255,255,255,.06);margin:2px 0;}
.smeta{text-align:right;}
.spill{font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase;}
.pf{background:rgba(51,204,102,.1);color:#33cc66;}
.pl{background:rgba(255,51,102,.1);color:#ff3366;animation:blink 1.5s infinite;}
.ps{background:rgba(255,221,0,.07);color:#ffdd00;}
.sdate{font-size:9px;color:rgba(255,255,255,.28);margin-top:2px;}

.loading{text-align:center;padding:32px;color:rgba(255,255,255,.3);}
.spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,.07);border-top-color:#ffdd00;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg)}}

.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(0,0,0,.4);border-top:1px solid rgba(255,153,0,.09);}
.footer-txt{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:1px;text-transform:uppercase;}
.rbtn{font-size:10px;font-weight:800;letter-spacing:1px;color:#ffdd00;background:rgba(255,221,0,.07);border:1px solid rgba(255,221,0,.22);border-radius:3px;padding:4px 11px;cursor:pointer;text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrapper">
<div class="deco"></div>
<div class="header">
  <div class="htitle">🏆 MUNDIAL 2026</div>
  <div class="hsub">Bracket · Proyección en Tiempo Real</div>
  <div class="hbadges">
    <span class="live-b"><span class="ldot"></span>En Vivo</span>
    <span class="upd" id="upd">Cargando...</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('bracket',this)">⚽ Bracket</div>
  <div class="tab" onclick="showTab('grupos',this)">📊 Grupos</div>
  <div class="tab" onclick="showTab('partidos',this)">🔴 Partidos</div>
</div>

<div class="section active" id="tab-bracket">
  <div class="bracket-outer">
    <div class="phase-lbl">🔮 Proyección Round of 32 — Si el torneo terminara ahora</div>
    <div class="bracket-layout" id="bracket-layout">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Calculando...</div>
    </div>
  </div>
  <div class="thirds-outer">
    <div class="thirds-title">📋 Ranking · Mejores Terceros</div>
    <div class="thirds-grid" id="thirds-grid"></div>
  </div>
</div>

<div class="section" id="tab-grupos">
  <div class="groups-sec"><div class="ggrid" id="ggrid"><div class="loading"><div class="spinner"></div></div></div></div>
</div>

<div class="section" id="tab-partidos">
  <div class="scores-sec" id="sclist"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="bottom-bar">
  <span class="footer-txt" id="footer-txt">Mundial 2026</span>
  <button class="rbtn" onclick="loadAll()">↻ Actualizar</button>
</div>
</div>

<script>
const FLAGS={
  MEX:'🇲🇽',KOR:'🇰🇷',CZE:'🇨🇿',RSA:'🇿🇦',CAN:'🇨🇦',SUI:'🇨🇭',BIH:'🇧🇦',QAT:'🇶🇦',
  BRA:'🇧🇷',MAR:'🇲🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',HAI:'🇭🇹',USA:'🇺🇸',AUS:'🇦🇺',PAR:'🇵🇾',TUR:'🇹🇷',
  GER:'🇩🇪',CIV:'🇨🇮',ECU:'🇪🇨',CUW:'🇨🇼',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',
  EGY:'🇪🇬',IRN:'🇮🇷',BEL:'🇧🇪',NZL:'🇳🇿',ESP:'🇪🇸',URU:'🇺🇾',CPV:'🇨🇻',KSA:'🇸🇦',
  NOR:'🇳🇴',FRA:'🇫🇷',SEN:'🇸🇳',IRQ:'🇮🇶',ARG:'🇦🇷',AUT:'🇦🇹',JOR:'🇯🇴',ALG:'🇩🇿',
  COL:'🇨🇴',COD:'🇨🇩',POR:'🇵🇹',UZB:'🇺🇿',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',GHA:'🇬🇭',PAN:'🇵🇦',CRO:'🇭🇷',
};

let standings=[],scores=[],lastUp=null;

async function loadAll(){
  try{
    const [s,sc]=await Promise.all([fetch('/api/standings'),fetch('/api/scores')]);
    const sd=await s.json(),scd=await sc.json();
    if(sd.success)standings=sd.data;
    if(scd.success)scores=scd.data;
    lastUp=new Date();render();
  }catch(e){console.error(e);}
}

function ts(){return lastUp?'Actualizado '+lastUp.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'';}
function render(){renderBracket();renderThirds();renderGroups();renderScores();const t=ts();document.getElementById('upd').textContent=t;document.getElementById('footer-txt').textContent=t+' · Mundial 2026';}

function getG(){
  const g={};
  for(const t of standings){if(!g[t.group])g[t.group]=[];g[t.group].push(t);}
  for(const k in g)g[k].sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
  return g;
}

function getThirds(g){
  const t=[];
  for(const k in g)if(g[k].length>=3)t.push({...g[k][2],grp:k});
  t.sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
  return t;
}

function flagOf(a){return FLAGS[a]||'🏳';}

function teamRow(t,badge){
  if(!t)return`<div class="mc-team tbd"><span class="mc-flag">🏳</span><div class="mc-info"><div class="mc-name">Por definir</div></div></div>`;
  const gd=t.gf-t.gc;
  return`<div class="mc-team"><span class="mc-flag">${flagOf(t.abbr)}</span><div class="mc-info"><div class="mc-name">${t.name}</div><div class="mc-meta">${t.pts}pts · GD:${gd>0?'+':''}${gd}</div></div>${badge?`<span class="mc-badge ${badge.c}">${badge.t}</span>`:''}</div>`;
}

function futureCard(){
  return`<div class="mc future"><div class="ef-row"><div class="ef-f"></div><div class="ef-n"></div></div><div class="ef-row"><div class="ef-f"></div><div class="ef-n"></div></div></div>`;
}

function matchCard(label,t1,t2,b1,b2){
  return`<div class="mc"><div class="mc-hdr">${label}</div>${teamRow(t1,b1)}<div class="mc-vs">VS</div>${teamRow(t2,b2)}</div>`;
}

function colActive(title,cls,matches){
  return`<div class="round-col"><div class="round-title ${cls}">${title}</div><div class="round-slots">${matches.map(([t1,t2,l,b1,b2])=>`<div class="match-wrap">${matchCard(l,t1,t2,b1,b2)}</div>`).join('')}</div></div>`;
}

function colFuture(title,cls,n){
  return`<div class="round-col"><div class="round-title ${cls}">${title}</div><div class="round-slots">${Array(n).fill(0).map(()=>`<div class="match-wrap">${futureCard()}</div>`).join('')}</div></div>`;
}

function renderBracket(){
  const g=getG();
  const thirds=getThirds(g);
  const top8=thirds.slice(0,8);

  // Asignar terceros: cada cruce tiene grupos permitidos
  // Se asigna el mejor tercero disponible de esos grupos
  // Calculamos todos a la vez para evitar conflictos
  const cruces3rd = [
    {match:'M74', groups:['A','B','C','D','F']},
    {match:'M77', groups:['C','D','F','G','H']},
    {match:'M79', groups:['C','E','F','H','I']},
    {match:'M80', groups:['E','H','I','J','K']},
    {match:'M82', groups:['A','E','H','I','J']},
    {match:'M81', groups:['B','E','F','I','J']},
    {match:'M83', groups:['E','F','G','I','J']},
    {match:'M87', groups:['D','E','I','J','L']},
  ];

  // Asignar el mejor tercero disponible a cada cruce
  const asignados = {};
  const usados = new Set();
  for(const cruce of cruces3rd){
    const t = top8.find(t => cruce.groups.includes(t.grp) && !usados.has(t.grp));
    if(t){ asignados[cruce.match] = t; usados.add(t.grp); }
    else { asignados[cruce.match] = null; }
  }

  const leftMatches = [
    [g.A?.[1], g.B?.[1],           'M73 · 2°A vs 2°B',      {c:'b2',t:'2°A'}, {c:'b2',t:'2°B'}],
    [g.C?.[0], g.F?.[1],           'M76 · 1°C vs 2°F',      {c:'b1',t:'1°C'}, {c:'b2',t:'2°F'}],
    [g.F?.[0], g.C?.[1],           'M75 · 1°F vs 2°C',      {c:'b1',t:'1°F'}, {c:'b2',t:'2°C'}],
    [g.E?.[0], asignados['M74'],   'M74 · 1°E vs Mejor 3°', {c:'b1',t:'1°E'}, {c:'b3',t:'3°'}],
    [g.I?.[0], asignados['M77'],   'M77 · 1°I vs Mejor 3°', {c:'b1',t:'1°I'}, {c:'b3',t:'3°'}],
    [g.E?.[1], g.I?.[1],           'M78 · 2°E vs 2°I',      {c:'b2',t:'2°E'}, {c:'b2',t:'2°I'}],
    [g.A?.[0], asignados['M79'],   'M79 · 1°A vs Mejor 3°', {c:'b1',t:'1°A'}, {c:'b3',t:'3°'}],
    [g.L?.[0], asignados['M80'],   'M80 · 1°L vs Mejor 3°', {c:'b1',t:'1°L'}, {c:'b3',t:'3°'}],
  ];

  const rightMatches = [
    [g.G?.[0], asignados['M82'],   'M82 · 1°G vs Mejor 3°', {c:'b1',t:'1°G'}, {c:'b3',t:'3°'}],
    [g.D?.[0], asignados['M81'],   'M81 · 1°D vs Mejor 3°', {c:'b1',t:'1°D'}, {c:'b3',t:'3°'}],
    [g.B?.[0], asignados['M83'],   'M83 · 1°B vs Mejor 3°', {c:'b1',t:'1°B'}, {c:'b3',t:'3°'}],
    [g.K?.[1], g.L?.[1],           'M84 · 2°K vs 2°L',      {c:'b2',t:'2°K'}, {c:'b2',t:'2°L'}],
    [g.J?.[0], g.H?.[1],           'M86 · 1°J vs 2°H',      {c:'b1',t:'1°J'}, {c:'b2',t:'2°H'}],
    [g.H?.[0], g.J?.[1],           'M85 · 1°H vs 2°J',      {c:'b1',t:'1°H'}, {c:'b2',t:'2°J'}],
    [g.K?.[0], asignados['M87'],   'M87 · 1°K vs Mejor 3°', {c:'b1',t:'1°K'}, {c:'b3',t:'3°'}],
    [g.D?.[1], g.G?.[1],           'M88 · 2°D vs 2°G',      {c:'b2',t:'2°D'}, {c:'b2',t:'2°G'}],
  ];

  const layout=document.getElementById('bracket-layout');
  layout.innerHTML=`
    ${colActive('16vos de Final','rt-r32',leftMatches)}
    ${colFuture('Octavos','rt-qf',4)}
    ${colFuture('Semis','rt-sf',2)}
    <div class="center-col">
      <div style="text-align:center">
        <div class="trophy-icon">🏆</div>
        <div class="trophy-lbl">Final</div>
      </div>
      <div class="final-match">${futureCard()}</div>
    </div>
    ${colFuture('Semis','rt-sf',2)}
    ${colFuture('Octavos','rt-qf',4)}
    ${colActive('16vos de Final','rt-r32',rightMatches)}
  `;
}

function renderThirds(){
  const g=getG();
  const thirds=getThirds(g);
  const c=document.getElementById('thirds-grid');
  c.innerHTML='';
  thirds.forEach((t,i)=>{
    const isIn=i<8,gd=t.gf-t.gc;
    const d=document.createElement('div');
    d.className=`tc ${isIn?'in':'out'}`;
    d.innerHTML=`<span class="tc-rank" style="color:${isIn?'#33cc66':'#ff3366'}">${i+1}</span><span class="tc-flag">${flagOf(t.abbr)}</span><div class="tc-info"><div class="tc-name">${t.name}</div><div class="tc-grp">Grp ${t.grp} · ${t.w+t.d+t.l}PJ</div></div><div class="tc-right"><div class="tc-pts">${t.pts}pts</div><div class="tc-gd">GD:${gd>0?'+':''}${gd}</div></div><span class="tc-badge ${isIn?'tb-in':'tb-out'}">${isIn?'CLASIFICA':'ELIMINADO'}</span>`;
    c.appendChild(d);
  });
}

function renderGroups(){
  const g=getG();
  const c=document.getElementById('ggrid');
  c.innerHTML='';
  for(const k of['A','B','C','D','E','F','G','H','I','J','K','L']){
    if(!g[k])continue;
    const card=document.createElement('div');
    card.className='gcard';
    card.innerHTML=`<div class="gheader">Grupo ${k}</div><table class="gtable"><thead><tr><th>Equipo</th><th>PJ</th><th>Pts</th><th>GD</th></tr></thead><tbody>${g[k].map((t,i)=>`<tr class="${i<2?'qrow':i===2?'t3row':''}"><td><div class="tcell"><div class="rnk r${i+1}">${i+1}</div><span style="font-size:13px">${flagOf(t.abbr)}</span><span>${t.name}</span></div></td><td>${t.w+t.d+t.l}</td><td class="pts-c">${t.pts}</td><td style="color:${(t.gf-t.gc)>0?'#33cc66':(t.gf-t.gc)<0?'#ff3366':'rgba(255,255,255,.28)'}">${t.gf-t.gc>0?'+':''}${t.gf-t.gc}</td></tr>`).join('')}</tbody></table>`;
    c.appendChild(card);
  }
}

function renderScores(){
  const c=document.getElementById('sclist');
  c.innerHTML='';
  const all=[...scores.filter(s=>s.status==='live'),...scores.filter(s=>s.status==='final'),...scores.filter(s=>s.status==='scheduled')];
  if(!all.length){c.innerHTML='<div class="loading">Sin partidos</div>';return;}
  for(const m of all){
    const wH=m.status==='final'&&m.sH>m.sA,wA=m.status==='final'&&m.sA>m.sH;
    const isL=m.status==='live',isS=m.status==='scheduled';
    const d=document.createElement('div');
    d.className='scard'+(isL?' live-g':'');
    d.innerHTML=`<div class="steams"><div class="srow"><span class="sflag">${flagOf(m.homeAbbr)}</span><span class="sname${wH?' w':''}">${m.home}</span><span class="snum">${isS?'':m.sH}</span></div><div class="ssep"></div><div class="srow"><span class="sflag">${flagOf(m.awayAbbr)}</span><span class="sname${wA?' w':''}">${m.away}</span><span class="snum">${isS?'':m.sA}</span></div></div><div class="smeta"><span class="spill ${m.status==='final'?'pf':isL?'pl':'ps'}">${m.status==='final'?'Final':isL?'En vivo':'Próximo'}</span><div class="sdate">${m.date}</div></div>`;
    c.appendChild(d);
  }
}

function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

loadAll();
setInterval(loadAll,90000);
</script>
</body>
</html>
