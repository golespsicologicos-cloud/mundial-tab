<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mundial 2026 — Bracket en Vivo</title>
<style>
  :root {
    --bg: #050d1a;
    --card: #0d1b2e;
    --card2: #112240;
    --border: rgba(255,255,255,0.07);
    --gold: #f5c842;
    --gold2: #e8a800;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --muted: rgba(255,255,255,0.4);
    --text: #eef2ff;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a1628 0%, #0f0a1e 50%, #0a1628 100%);
    border-bottom: 1px solid rgba(245,200,66,0.2);
    padding: 14px 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { font-size: 28px; filter: drop-shadow(0 0 8px rgba(245,200,66,0.4)); }
  .header-title { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; color: var(--gold); }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .live-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 700; color: #ef4444;
    letter-spacing: 0.5px;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TABS */
  .tabs {
    display: flex; background: var(--card); border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab {
    flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; font-weight: 700;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; min-width: 80px; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .section { display: none; padding: 12px; }
  .section.active { display: block; }

  .update-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.15);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
  }
  .update-text { font-size: 11px; color: #7eb3f5; }
  .refresh-btn {
    font-size: 11px; color: #7eb3f5; background: rgba(37,99,235,0.15);
    border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer;
  }

  /* BRACKET */
  .bracket-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
  .bracket { display: flex; gap: 0; padding: 8px 0; }
  .round { display: flex; flex-direction: column; min-width: 165px; }
  .round-label {
    text-align: center; font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
    color: var(--gold); text-transform: uppercase; padding-bottom: 10px;
    text-shadow: 0 0 12px rgba(245,200,66,0.3);
  }
  .round-games { display: flex; flex-direction: column; flex: 1; justify-content: space-around; }
  .matchup {
    display: flex; flex-direction: column; justify-content: center;
    flex: 1; padding: 4px 8px; position: relative;
  }
  .matchup::after {
    content: ''; position: absolute; right: 0; top: 25%; bottom: 25%;
    width: 1px; background: linear-gradient(to bottom, transparent, rgba(245,200,66,0.2), transparent);
  }
  .round:last-child .matchup::after { display: none; }
  .match-box {
    background: linear-gradient(135deg, #0d1b2e, #112240);
    border: 1px solid rgba(245,200,66,0.15);
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .match-box:hover {
    border-color: rgba(245,200,66,0.4);
    box-shadow: 0 4px 20px rgba(245,200,66,0.1);
  }
  .match-team {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 10px; font-size: 12px; color: var(--muted);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .match-team:last-child { border-bottom: none; }
  .match-team.winner {
    color: var(--text); font-weight: 700;
    background: linear-gradient(90deg, rgba(245,200,66,0.08), transparent);
  }
  .match-team.tbd { color: rgba(255,255,255,0.15); font-style: italic; }
  .match-team-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match-flag { font-size: 15px; line-height: 1; }
  .phase-label {
    text-align: center; font-size: 11px; font-weight: 700; color: var(--muted);
    padding: 10px; letter-spacing: 0.5px;
    background: rgba(245,200,66,0.04); border-top: 1px solid rgba(245,200,66,0.08);
  }

  /* GROUPS */
  .groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .groups-grid { grid-template-columns: 1fr; } }
  .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .group-header {
    background: linear-gradient(90deg, rgba(37,99,235,0.2), rgba(37,99,235,0.05));
    padding: 7px 10px; font-size: 11px; font-weight: 800; color: #93c5fd;
    letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border);
  }
  .group-table { width: 100%; border-collapse: collapse; }
  .group-table th {
    font-size: 10px; color: var(--muted); font-weight: 600; padding: 5px 8px;
    text-align: right; border-bottom: 1px solid var(--border);
  }
  .group-table th:first-child { text-align: left; }
  .group-table td { padding: 6px 8px; font-size: 11px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.02); }
  .group-table td:first-child { text-align: left; }
  .group-table tr:last-child td { border-bottom: none; }
  .team-cell { display: flex; align-items: center; gap: 5px; }
  .rank-badge { width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
  .rank-1 { background: rgba(245,200,66,0.2); color: var(--gold); }
  .rank-2 { background: rgba(34,197,94,0.15); color: var(--green); }
  .rank-3,.rank-4 { background: rgba(255,255,255,0.04); color: var(--muted); }
  .pts-cell { font-weight: 800; color: var(--text); }
  .qualified { background: rgba(34,197,94,0.03); }

  /* SCORES */
  .scores-list { display: flex; flex-direction: column; gap: 8px; }
  .score-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  }
  .score-card.live { border-color: rgba(239,68,68,0.3); }
  .score-teams { flex: 1; }
  .score-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .score-flag { font-size: 17px; }
  .score-name { flex: 1; font-size: 13px; }
  .score-name.winner { font-weight: 700; color: var(--text); }
  .score-num { font-size: 17px; font-weight: 800; min-width: 16px; text-align: right; }
  .score-divider { height: 1px; background: var(--border); margin: 3px 0; }
  .score-meta { text-align: right; min-width: 72px; }
  .score-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .status-final { background: rgba(34,197,94,0.12); color: var(--green); }
  .status-live { background: rgba(239,68,68,0.12); color: var(--red); animation: pulse 1.5s infinite; }
  .status-sched { background: rgba(245,200,66,0.08); color: var(--gold); }
  .score-date { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; padding: 14px; color: var(--muted); font-size: 10px; border-top: 1px solid var(--border); margin-top: 12px; }

  /* LEGEND */
  .legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; padding: 0 4px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">🏆</div>
    <div>
      <div class="header-title">MUNDIAL 2026</div>
      <div class="header-sub">Bracket · Tiempo Real</div>
    </div>
  </div>
  <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('bracket',this)">🗂 Bracket</div>
  <div class="tab" onclick="showTab('grupos',this)">📊 Grupos</div>
  <div class="tab" onclick="showTab('partidos',this)">⚽ Partidos</div>
</div>

<div class="section active" id="tab-bracket">
  <div class="update-bar">
    <span class="update-text" id="bracket-updated">Cargando datos...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
  </div>
  <div class="bracket-wrap">
    <div class="bracket" id="bracket-view">
      <div class="loading"><div class="spinner"></div>Calculando clasificados...</div>
    </div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:rgba(245,200,66,0.3)"></div>Líder de grupo</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(34,197,94,0.2)"></div>2° clasificado</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,0.05)"></div>Por definir</div>
  </div>
</div>

<div class="section" id="tab-grupos">
  <div class="update-bar">
    <span class="update-text" id="grupos-updated">Cargando...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
  </div>
  <div class="groups-grid" id="groups-view">
    <div class="loading"><div class="spinner"></div>Cargando grupos...</div>
  </div>
</div>

<div class="section" id="tab-partidos">
  <div class="update-bar">
    <span class="update-text" id="scores-updated">Cargando...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
  </div>
  <div class="scores-list" id="scores-view">
    <div class="loading"><div class="spinner"></div>Cargando partidos...</div>
  </div>
</div>

<div class="footer" id="footer-time">Datos actualizados automáticamente · Mundial 2026</div>

<script>
const FLAGS = {
  MEX:'🇲🇽',KOR:'🇰🇷',CZE:'🇨🇿',RSA:'🇿🇦',CAN:'🇨🇦',SUI:'🇨🇭',BIH:'🇧🇦',QAT:'🇶🇦',
  BRA:'🇧🇷',MAR:'🇲🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',HTI:'🇭🇹',USA:'🇺🇸',AUS:'🇦🇺',PAR:'🇵🇾',TUR:'🇹🇷',
  GER:'🇩🇪',CIV:'🇨🇮',ECU:'🇪🇨',CUW:'🇨🇼',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',
  EGY:'🇪🇬',IRN:'🇮🇷',BEL:'🇧🇪',NZL:'🇳🇿',ESP:'🇪🇸',URU:'🇺🇾',CPV:'🇨🇻',KSA:'🇸🇦',
  NOR:'🇳🇴',FRA:'🇫🇷',SEN:'🇸🇳',IRQ:'🇮🇶',ARG:'🇦🇷',AUT:'🇦🇹',JOR:'🇯🇴',DZA:'🇩🇿',
  COL:'🇨🇴',COD:'🇨🇩',POR:'🇵🇹',UZB:'🇺🇿',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',GHA:'🇬🇭',PAN:'🇵🇦',CRO:'🇭🇷',
};

// Fase actual: 'grupos' | 'octavos' | 'cuartos' | 'semis' | 'final'
const FASE_ACTUAL = 'grupos';

let standings = [], scores = [], lastUpdated = null;

async function loadAll() {
  try {
    const [sRes, scRes] = await Promise.all([fetch('/api/standings'), fetch('/api/scores')]);
    const sData = await sRes.json();
    const scData = await scRes.json();
    if (sData.success) standings = sData.data;
    if (scData.success) scores = scData.data;
    lastUpdated = new Date();
    renderAll();
  } catch(e) { console.error('Error:', e); }
}

function timeStr() {
  if (!lastUpdated) return 'Sin datos';
  return 'Actualizado: ' + lastUpdated.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
}

function renderAll() { renderBracket(); renderGroups(); renderScores(); }

function getGroupWinners() {
  const groups = {};
  for (const t of standings) {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  }
  const result = {};
  for (const g in groups) {
    result[g] = groups[g].sort((a,b) => b.pts - a.pts || (b.gf-b.gc)-(a.gf-a.gc));
  }
  return result;
}

function renderBracket() {
  const gw = getGroupWinners();
  const g = {};
  for (const key in gw) g[key] = { first: gw[key][0], second: gw[key][1] };

  const container = document.getElementById('bracket-view');
  container.innerHTML = '';

  // Solo muestra la ronda siguiente a la fase actual
  let rounds = [];
  let faseLabel = '';

  if (FASE_ACTUAL === 'grupos') {
    // Solo octavos proyectados
    faseLabel = '🔮 Proyección: Octavos de Final';
    rounds = [{
      label: 'Octavos de Final',
      games: [
        [g.A?.first,  g.B?.second],
        [g.C?.first,  g.D?.second],
        [g.E?.first,  g.F?.second],
        [g.G?.first,  g.H?.second],
        [g.I?.first,  g.J?.second],
        [g.K?.first,  g.L?.second],
        [g.B?.first,  g.A?.second],
        [g.D?.first,  g.C?.second],
      ]
    }];
  } else if (FASE_ACTUAL === 'octavos') {
    faseLabel = '⚔️ Cuartos de Final';
    rounds = [{ label: 'Cuartos de Final', games: [[null,null],[null,null],[null,null],[null,null]] }];
  } else if (FASE_ACTUAL === 'cuartos') {
    faseLabel = '🔥 Semifinales';
    rounds = [{ label: 'Semifinales', games: [[null,null],[null,null]] }];
  } else if (FASE_ACTUAL === 'semis') {
    faseLabel = '🏆 Gran Final';
    rounds = [{ label: 'Final', games: [[null,null]] }];
  }

  // Etiqueta de fase
  const phaseDiv = document.createElement('div');
  phaseDiv.style.cssText = 'width:100%;text-align:center;font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1px;padding:0 0 12px;text-shadow:0 0 12px rgba(245,200,66,0.3)';
  phaseDiv.textContent = faseLabel;
  container.appendChild(phaseDiv);

  const bracketRow = document.createElement('div');
  bracketRow.style.cssText = 'display:flex;width:100%';

  rounds.forEach(r => {
    const col = document.createElement('div');
    col.className = 'round';
    col.style.flex = '1';

    const label = document.createElement('div');
    label.className = 'round-label';
    label.textContent = r.label;
    col.appendChild(label);

    const gamesWrap = document.createElement('div');
    gamesWrap.className = 'round-games';

    r.games.forEach(([t1, t2]) => {
      const wrap = document.createElement('div');
      wrap.className = 'matchup';
      const box = document.createElement('div');
      box.className = 'match-box';

      [t1, t2].forEach((team, i) => {
        const row = document.createElement('div');
        if (!team) {
          row.className = 'match-team tbd';
          row.innerHTML = `<span class="match-flag">🏳</span><span class="match-team-name">Por definir</span>`;
        } else {
          row.className = 'match-team' + (i === 0 ? ' winner' : '');
          row.innerHTML = `<span class="match-flag">${FLAGS[team.abbr]||'🏳'}</span><span class="match-team-name">${team.name}</span>`;
        }
        if (i === 0) row.style.borderBottom = '1px solid rgba(255,255,255,0.04)';
        box.appendChild(row);
      });

      wrap.appendChild(box);
      gamesWrap.appendChild(wrap);
    });

    col.appendChild(gamesWrap);
    bracketRow.appendChild(col);
  });

  container.appendChild(bracketRow);
  document.getElementById('bracket-updated').textContent = '📊 ' + faseLabel + ' · ' + timeStr();
  document.getElementById('footer-time').textContent = timeStr() + ' · Mundial 2026 · Fase de Grupos';
}

function renderGroups() {
  const groups = {};
  for (const t of standings) {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  }
  const container = document.getElementById('groups-view');
  container.innerHTML = '';
  for (const gKey of ['A','B','C','D','E','F','G','H','I','J','K','L']) {
    if (!groups[gKey]) continue;
    const teams = groups[gKey].sort((a,b) => b.pts-a.pts || (b.gf-b.gc)-(a.gf-a.gc));
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-header">GRUPO ${gKey}</div>
      <table class="group-table">
        <thead><tr><th>Equipo</th><th>PJ</th><th>Pts</th><th>GD</th></tr></thead>
        <tbody>${teams.map((t,i)=>`
          <tr class="${i<2?'qualified':''}">
            <td><div class="team-cell">
              <div class="rank-badge rank-${i+1}">${i+1}</div>
              <span>${FLAGS[t.abbr]||'🏳'}</span>
              <span>${t.name}</span>
            </div></td>
            <td>${t.w+t.d+t.l}</td>
            <td class="pts-cell">${t.pts}</td>
            <td style="color:${(t.gf-t.gc)>0?'#22c55e':(t.gf-t.gc)<0?'#ef4444':'var(--muted)'}">${t.gf-t.gc>0?'+':''}${t.gf-t.gc}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    container.appendChild(card);
  }
  document.getElementById('grupos-updated').textContent = timeStr();
}

function renderScores() {
  const container = document.getElementById('scores-view');
  container.innerHTML = '';
  const all = [...scores.filter(s=>s.status==='live'), ...scores.filter(s=>s.status==='final'), ...scores.filter(s=>s.status==='scheduled')];
  if (!all.length) { container.innerHTML = '<div class="loading">Sin partidos disponibles</div>'; return; }
  for (const g of all) {
    const winH = g.status==='final' && g.sH>g.sA;
    const winA = g.status==='final' && g.sA>g.sH;
    const isLive = g.status==='live';
    const isSched = g.status==='scheduled';
    const card = document.createElement('div');
    card.className = 'score-card'+(isLive?' live':'');
    const statusLabel = g.status==='final'?'Final':isLive?'🔴 En vivo':'Próximo';
    const statusClass = g.status==='final'?'status-final':isLive?'status-live':'status-sched';
    card.innerHTML = `
      <div class="score-teams">
        <div class="score-row">
          <span class="score-flag">${FLAGS[g.homeAbbr]||'🏳'}</span>
          <span class="score-name ${winH?'winner':''}">${g.home}</span>
          <span class="score-num">${isSched?'':g.sH}</span>
        </div>
        <div class="score-divider"></div>
        <div class="score-row">
          <span class="score-flag">${FLAGS[g.awayAbbr]||'🏳'}</span>
          <span class="score-name ${winA?'winner':''}">${g.away}</span>
          <span class="score-num">${isSched?'':g.sA}</span>
        </div>
      </div>
      <div class="score-meta">
        <span class="score-status ${statusClass}">${statusLabel}</span>
        <div class="score-date">${g.date}</div>
      </div>`;
    container.appendChild(card);
  }
  document.getElementById('scores-updated').textContent = timeStr();
}

function showTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

loadAll();
setInterval(loadAll, 90000);
</script>
</body>
</html>
