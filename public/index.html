<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Bracket en Vivo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0e0030;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;}

.deco{height:14px;background:repeating-linear-gradient(90deg,#f5c842 0,#f5c842 16px,#e84040 16px,#e84040 32px,#3b82f6 32px,#3b82f6 48px,#22c55e 48px,#22c55e 64px,#f97316 64px,#f97316 80px,#a855f7 80px,#a855f7 96px);}

.header{text-align:center;padding:14px 16px 10px;background:linear-gradient(180deg,#1a0055 0%,#0e0030 100%);border-bottom:2px solid rgba(245,200,66,.3);}
.htitle{font-family:'Bebas Neue','Impact',sans-serif;font-size:clamp(24px,6vw,44px);letter-spacing:4px;color:#f5c842;text-shadow:3px 3px 0 #5b21b6,0 0 40px rgba(245,200,66,.5);line-height:1;}
.hsub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
.live-b{display:inline-flex;align-items:center;gap:6px;border:1px solid #ef4444;border-radius:4px;padding:4px 14px;font-size:10px;font-weight:800;color:#ef4444;letter-spacing:2px;text-transform:uppercase;margin-top:8px;background:rgba(239,68,68,.08);}
.ldot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.tabs{display:flex;justify-content:center;gap:4px;padding:8px 12px;background:rgba(0,0,0,.3);}
.tab{padding:7px 18px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);cursor:pointer;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;transition:all .2s;}
.tab.active{color:#f5c842;border-color:#f5c842;background:rgba(245,200,66,.08);}

.ubar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.05);}
.utxt{font-size:10px;color:rgba(255,255,255,.3);}
.rbtn{font-size:10px;font-weight:800;letter-spacing:1px;color:#f5c842;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);border-radius:4px;padding:4px 12px;cursor:pointer;text-transform:uppercase;}

.section{display:none;}.section.active{display:block;}

/* ========= BRACKET ========= */
.bracket-outer{padding:14px 10px 8px;overflow-x:auto;}
.phase-lbl{text-align:center;font-family:'Bebas Neue','Impact',sans-serif;font-size:14px;letter-spacing:3px;color:#f5c842;margin-bottom:12px;opacity:.85;}

.r32-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;min-width:640px;}

/* Match card */
.mc{background:linear-gradient(135deg,rgba(91,33,182,.45),rgba(49,10,130,.45));border:1px solid rgba(245,200,66,.22);border-radius:9px;overflow:hidden;transition:all .2s;}
.mc:hover{border-color:rgba(245,200,66,.55);transform:translateY(-1px);}
.mc.future{opacity:.3;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);}

.mc-hdr{padding:4px 9px;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.05);}
.mc-vs{text-align:center;font-size:8px;font-weight:800;color:rgba(245,200,66,.4);padding:2px;background:rgba(0,0,0,.15);letter-spacing:2px;}

.mc-team{display:flex;align-items:center;gap:7px;padding:8px 9px;border-bottom:1px solid rgba(255,255,255,.05);}
.mc-team:last-child{border-bottom:none;}
.mc-team.tbd{opacity:.3;}
.mc-flag{font-size:22px;line-height:1;width:28px;text-align:center;flex-shrink:0;}
.mc-info{flex:1;min-width:0;}
.mc-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-pts{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px;}
.mc-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;flex-shrink:0;}
.b1{background:rgba(245,200,66,.2);color:#f5c842;}
.b2{background:rgba(34,197,94,.15);color:#22c55e;}
.b3{background:rgba(100,150,255,.12);color:#7eb3f5;}

/* ========= TERCEROS ========= */
.thirds-outer{padding:0 10px 14px;}
.thirds-ttl{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#f5c842;margin-bottom:8px;}
.thirds-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(max-width:420px){.thirds-grid{grid-template-columns:1fr;}}
.tc{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid;}
.tc.in{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25);}
.tc.out{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.18);opacity:.55;}
.tc-rank{font-size:11px;font-weight:900;width:18px;flex-shrink:0;}
.tc-flag{font-size:20px;}
.tc-info{flex:1;min-width:0;}
.tc-name{font-size:11px;font-weight:700;}
.tc-grp{font-size:9px;color:rgba(255,255,255,.35);margin-top:1px;}
.tc-pts{font-size:11px;font-weight:800;color:#f5c842;text-align:right;}
.tc-gd{font-size:9px;color:rgba(255,255,255,.35);text-align:right;margin-top:1px;}
.tc-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.tb-in{background:rgba(34,197,94,.2);color:#22c55e;}
.tb-out{background:rgba(239,68,68,.15);color:#ef4444;}

/* ========= GRUPOS ========= */
.groups-sec{padding:12px 10px;}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:460px){.ggrid{grid-template-columns:1fr;}}
.gcard{background:linear-gradient(135deg,rgba(91,33,182,.25),rgba(49,10,130,.25));border:1px solid rgba(245,200,66,.12);border-radius:8px;overflow:hidden;}
.gheader{padding:6px 10px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#f5c842;background:rgba(245,200,66,.06);border-bottom:1px solid rgba(245,200,66,.08);}
.gtable{width:100%;border-collapse:collapse;}
.gtable th{font-size:9px;color:rgba(255,255,255,.22);font-weight:700;padding:4px 8px;text-align:right;}
.gtable th:first-child{text-align:left;}
.gtable td{padding:5px 8px;font-size:11px;text-align:right;border-top:1px solid rgba(255,255,255,.03);}
.gtable td:first-child{text-align:left;}
.tcell{display:flex;align-items:center;gap:5px;}
.rnk{width:14px;height:14px;border-radius:3px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.r1{background:rgba(245,200,66,.2);color:#f5c842;}
.r2{background:rgba(34,197,94,.15);color:#22c55e;}
.r3{background:rgba(100,150,255,.1);color:#7eb3f5;}
.r4{background:rgba(255,255,255,.04);color:rgba(255,255,255,.25);}
.pts-c{font-weight:800;color:#f5c842;}
.qrow{background:rgba(34,197,94,.04);}
.t3row{background:rgba(100,150,255,.03);}

/* ========= PARTIDOS ========= */
.scores-sec{padding:12px 10px;display:flex;flex-direction:column;gap:7px;}
.scard{background:linear-gradient(135deg,rgba(91,33,182,.25),rgba(49,10,130,.25));border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.scard.live-g{border-color:rgba(239,68,68,.35);}
.steams{flex:1;}
.srow{display:flex;align-items:center;gap:8px;padding:2px 0;}
.sflag{font-size:18px;}
.sname{flex:1;font-size:12px;}
.sname.w{font-weight:800;}
.snum{font-size:18px;font-weight:800;min-width:18px;text-align:right;color:#f5c842;}
.ssep{height:1px;background:rgba(255,255,255,.06);margin:2px 0;}
.smeta{text-align:right;}
.spill{font-size:9px;font-weight:800;padding:2px 8px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase;}
.pf{background:rgba(34,197,94,.12);color:#22c55e;}
.pl{background:rgba(239,68,68,.12);color:#ef4444;animation:blink 1.5s infinite;}
.ps{background:rgba(245,200,66,.08);color:#f5c842;}
.sdate{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;}

.loading{text-align:center;padding:36px;color:rgba(255,255,255,.3);}
.spinner{width:26px;height:26px;border:2px solid rgba(255,255,255,.07);border-top-color:#f5c842;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{text-align:center;padding:10px;font-size:9px;color:rgba(255,255,255,.2);letter-spacing:1px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="deco"></div>

<div class="header">
  <div class="htitle">🏆 MUNDIAL 2026</div>
  <div class="hsub">Bracket · Proyección en Tiempo Real</div>
  <div><span class="live-b"><span class="ldot"></span>En Vivo</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('bracket',this)">⚽ Bracket</div>
  <div class="tab" onclick="showTab('grupos',this)">📊 Grupos</div>
  <div class="tab" onclick="showTab('partidos',this)">🔴 Partidos</div>
</div>

<div class="ubar">
  <span class="utxt" id="utxt">Cargando...</span>
  <button class="rbtn" onclick="loadAll()">↻ Actualizar</button>
</div>

<!-- BRACKET -->
<div class="section active" id="tab-bracket">
  <div class="bracket-outer">
    <div class="phase-lbl" id="phase-lbl">🔮 Proyección Round of 32 — Si terminara ahora</div>
    <div class="r32-grid" id="r32grid">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Calculando clasificados...</div>
    </div>
  </div>
  <div class="thirds-outer">
    <div class="thirds-ttl">📋 Ranking · Mejores Terceros Lugares</div>
    <div class="thirds-grid" id="thirds-grid"></div>
  </div>
</div>

<!-- GRUPOS -->
<div class="section" id="tab-grupos">
  <div class="groups-sec">
    <div class="ggrid" id="ggrid">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>
</div>

<!-- PARTIDOS -->
<div class="section" id="tab-partidos">
  <div class="scores-sec" id="sclist">
    <div class="loading"><div class="spinner"></div>Cargando...</div>
  </div>
</div>

<div class="footer" id="ftxt">Mundial 2026 · Actualización automática cada 15 min</div>
<div class="deco" style="margin-top:6px;filter:hue-rotate(180deg);"></div>

<script>
const FLAGS={
  MEX:'🇲🇽',KOR:'🇰🇷',CZE:'🇨🇿',RSA:'🇿🇦',CAN:'🇨🇦',SUI:'🇨🇭',BIH:'🇧🇦',QAT:'🇶🇦',
  BRA:'🇧🇷',MAR:'🇲🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',HAI:'🇭🇹',USA:'🇺🇸',AUS:'🇦🇺',PAR:'🇵🇾',TUR:'🇹🇷',
  GER:'🇩🇪',CIV:'🇨🇮',ECU:'🇪🇨',CUW:'🇨🇼',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',
  EGY:'🇪🇬',IRN:'🇮🇷',BEL:'🇧🇪',NZL:'🇳🇿',ESP:'🇪🇸',URU:'🇺🇾',CPV:'🇨🇻',KSA:'🇸🇦',
  NOR:'🇳🇴',FRA:'🇫🇷',SEN:'🇸🇳',IRQ:'🇮🇶',ARG:'🇦🇷',AUT:'🇦🇹',JOR:'🇯🇴',ALG:'🇩🇿',
  COL:'🇨🇴',COD:'🇨🇩',POR:'🇵🇹',UZB:'🇺🇿',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',GHA:'🇬🇭',PAN:'🇵🇦',CRO:'🇭🇷',
};

let standings=[],scores=[],lastUp=null;

async function loadAll(){
  try{
    const [s,sc]=await Promise.all([fetch('/api/standings'),fetch('/api/scores')]);
    const sd=await s.json(),scd=await sc.json();
    if(sd.success)standings=sd.data;
    if(scd.success)scores=scd.data;
    lastUp=new Date();render();
  }catch(e){console.error(e);}
}

function ts(){return lastUp?'Actualizado '+lastUp.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'';}

function render(){
  renderBracket();renderThirds();renderGroups();renderScores();
  document.getElementById('utxt').textContent=ts();
  document.getElementById('ftxt').textContent=ts()+' · Mundial 2026';
}

function getG(){
  const g={};
  for(const t of standings){if(!g[t.group])g[t.group]=[];g[t.group].push(t);}
  for(const k in g)g[k].sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
  return g;
}

// Ranking de terceros: ordenar los 12 terceros y tomar top 8
function getThirds(g){
  const thirds=[];
  for(const k in g){
    if(g[k].length>=3){
      thirds.push({...g[k][2],grp:k});
    }
  }
  // Ordenar: pts > gd > goles > partidos jugados
  thirds.sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const gdA=a.gf-a.gc, gdB=b.gf-b.gc;
    if(gdB!==gdA)return gdB-gdA;
    if(b.gf!==a.gf)return b.gf-a.gf;
    return 0;
  });
  return thirds;
}

function flagOf(abbr){return FLAGS[abbr]||'🏳';}

function teamBlock(t,badge=''){
  if(!t)return`<div class="mc-team tbd"><span class="mc-flag">🏳</span><div class="mc-info"><div class="mc-name">Por definir</div></div></div>`;
  const gd=t.gf-t.gc;
  return`<div class="mc-team">
    <span class="mc-flag">${flagOf(t.abbr)}</span>
    <div class="mc-info">
      <div class="mc-name">${t.name}</div>
      <div class="mc-pts">${t.pts}pts · GD:${gd>0?'+':''}${gd}</div>
    </div>
    ${badge?`<span class="mc-badge ${badge.cls}">${badge.txt}</span>`:''}
  </div>`;
}

function card(label,t1,t2,b1='',b2='',future=false){
  return`<div class="mc${future?' future':''}">
    <div class="mc-hdr">${label}</div>
    ${teamBlock(t1,b1)}
    <div class="mc-vs">VS</div>
    ${teamBlock(t2,b2)}
  </div>`;
}

// Cruces oficiales Round of 32 FIFA 2026
// 4 winner vs runner-up | 8 winner vs 3rd | 4 runner-up vs runner-up
function renderBracket(){
  const g=getG();
  const thirds=getThirds(g);
  const top8=thirds.slice(0,8);

  // Busca el mejor tercero disponible de grupos específicos
  // que no haya sido asignado ya
  const used=new Set();
  function pick3rd(groups){
    const t=top8.find(t=>groups.includes(t.grp)&&!used.has(t.grp));
    if(t)used.add(t.grp);
    return t||null;
  }

  // Cruces oficiales FIFA (fuente: FIFA.com + ESPN schedule)
  const matches=[
    // Runner-up vs Runner-up (4 partidos)
    {l:'M73 · 2°A vs 2°B', t1:g.A?.[1], t2:g.B?.[1], b1:{cls:'b2',txt:'2°A'}, b2:{cls:'b2',txt:'2°B'}},
    {l:'M80 · 1°D vs 2°E', t1:g.D?.[0], t2:g.E?.[1], b1:{cls:'b1',txt:'1°D'}, b2:{cls:'b2',txt:'2°E'}},
    {l:'M83 · 2°G vs 2°D', t1:g.G?.[1], t2:g.D?.[1], b1:{cls:'b2',txt:'2°G'}, b2:{cls:'b2',txt:'2°D'}},
    {l:'M84 · 2°K vs 2°L', t1:g.K?.[1], t2:g.L?.[1], b1:{cls:'b2',txt:'2°K'}, b2:{cls:'b2',txt:'2°L'}},
    // Winner vs Runner-up (4 partidos fijos)
    {l:'M75 · 1°F vs 2°C', t1:g.F?.[0], t2:g.C?.[1], b1:{cls:'b1',txt:'1°F'}, b2:{cls:'b2',txt:'2°C'}},
    {l:'M81 · 1°G vs 2°F', t1:g.G?.[0], t2:g.F?.[1], b1:{cls:'b1',txt:'1°G'}, b2:{cls:'b2',txt:'2°F'}},
    {l:'M82 · 2°I vs 2°J', t1:g.I?.[1], t2:g.J?.[1], b1:{cls:'b2',txt:'2°I'}, b2:{cls:'b2',txt:'2°J'}},
    {l:'M86 · 1°J vs 2°H', t1:g.J?.[0], t2:g.H?.[1], b1:{cls:'b1',txt:'1°J'}, b2:{cls:'b2',txt:'2°H'}},
    // Winner vs 3rd place (8 partidos)
    {l:'M74 · 1°C vs Mejor 3°', t1:g.C?.[0], t2:pick3rd(['E','F','H','I']), b1:{cls:'b1',txt:'1°C'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M76 · 1°A vs Mejor 3°', t1:g.A?.[0], t2:pick3rd(['C','E','F','H','I']), b1:{cls:'b1',txt:'1°A'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M77 · 1°E vs Mejor 3°', t1:g.E?.[0], t2:pick3rd(['A','B','C','D','F']), b1:{cls:'b1',txt:'1°E'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M78 · 1°I vs Mejor 3°', t1:g.I?.[0], t2:pick3rd(['C','D','F','G','H']), b1:{cls:'b1',txt:'1°I'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M79 · 1°B vs Mejor 3°', t1:g.B?.[0], t2:pick3rd(['E','F','G','I','J']), b1:{cls:'b1',txt:'1°B'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M85 · 1°H vs Mejor 3°', t1:g.H?.[0], t2:pick3rd(['A','B','C','D']), b1:{cls:'b1',txt:'1°H'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M87 · 1°K vs Mejor 3°', t1:g.K?.[0], t2:pick3rd(['D','E','I','J','L']), b1:{cls:'b1',txt:'1°K'}, b2:{cls:'b3',txt:'3°'}},
    {l:'M88 · 1°L vs Mejor 3°', t1:g.L?.[0], t2:pick3rd(['A','B','G','K']), b1:{cls:'b1',txt:'1°L'}, b2:{cls:'b3',txt:'3°'}},
  ];

  const grid=document.getElementById('r32grid');
  grid.innerHTML='';
  matches.forEach(m=>{
    const div=document.createElement('div');
    div.innerHTML=card(m.l,m.t1,m.t2,m.b1,m.b2,!m.t1&&!m.t2);
    grid.appendChild(div);
  });
}

function renderThirds(){
  const g=getG();
  const thirds=getThirds(g);
  const c=document.getElementById('thirds-grid');
  c.innerHTML='';
  thirds.forEach((t,i)=>{
    const isIn=i<8;
    const flag=flagOf(t.abbr);
    const gd=t.gf-t.gc;
    const div=document.createElement('div');
    div.className=`tc ${isIn?'in':'out'}`;
    div.innerHTML=`
      <span class="tc-rank" style="color:${isIn?'#22c55e':'#ef4444'}">${i+1}</span>
      <span class="tc-flag">${flag}</span>
      <div class="tc-info">
        <div class="tc-name">${t.name}</div>
        <div class="tc-grp">Grupo ${t.grp} · ${t.w+t.d+t.l} partidos</div>
      </div>
      <div style="text-align:right">
        <div class="tc-pts">${t.pts}pts</div>
        <div class="tc-gd">GD:${gd>0?'+':''}${gd}</div>
      </div>
      <span class="tc-badge ${isIn?'tb-in':'tb-out'}">${isIn?'CLASIFICA':'ELIMINADO'}</span>`;
    c.appendChild(div);
  });
}

function renderGroups(){
  const g=getG();
  const c=document.getElementById('ggrid');
  c.innerHTML='';
  for(const k of['A','B','C','D','E','F','G','H','I','J','K','L']){
    if(!g[k])continue;
    const card=document.createElement('div');
    card.className='gcard';
    card.innerHTML=`<div class="gheader">Grupo ${k}</div>
      <table class="gtable">
        <thead><tr><th>Equipo</th><th>PJ</th><th>Pts</th><th>GD</th></tr></thead>
        <tbody>${g[k].map((t,i)=>`
          <tr class="${i<2?'qrow':i===2?'t3row':''}">
            <td><div class="tcell">
              <div class="rnk r${i+1}">${i+1}</div>
              <span style="font-size:14px">${flagOf(t.abbr)}</span>
              <span>${t.name}</span>
            </div></td>
            <td>${t.w+t.d+t.l}</td>
            <td class="pts-c">${t.pts}</td>
            <td style="color:${(t.gf-t.gc)>0?'#22c55e':(t.gf-t.gc)<0?'#ef4444':'rgba(255,255,255,.3)'}">${t.gf-t.gc>0?'+':''}${t.gf-t.gc}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    c.appendChild(card);
  }
}

function renderScores(){
  const c=document.getElementById('sclist');
  c.innerHTML='';
  const all=[...scores.filter(s=>s.status==='live'),...scores.filter(s=>s.status==='final'),...scores.filter(s=>s.status==='scheduled')];
  if(!all.length){c.innerHTML='<div class="loading">Sin partidos</div>';return;}
  for(const m of all){
    const wH=m.status==='final'&&m.sH>m.sA,wA=m.status==='final'&&m.sA>m.sH;
    const isL=m.status==='live',isS=m.status==='scheduled';
    const pill=m.status==='final'?'pf':isL?'pl':'ps';
    const label=m.status==='final'?'Final':isL?'En vivo':'Próximo';
    const div=document.createElement('div');
    div.className='scard'+(isL?' live-g':'');
    div.innerHTML=`<div class="steams">
      <div class="srow"><span class="sflag">${flagOf(m.homeAbbr)}</span><span class="sname${wH?' w':''}">${m.home}</span><span class="snum">${isS?'':m.sH}</span></div>
      <div class="ssep"></div>
      <div class="srow"><span class="sflag">${flagOf(m.awayAbbr)}</span><span class="sname${wA?' w':''}">${m.away}</span><span class="snum">${isS?'':m.sA}</span></div>
    </div>
    <div class="smeta"><span class="spill ${pill}">${label}</span><div class="sdate">${m.date}</div></div>`;
    c.appendChild(div);
  }
}

function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

loadAll();
setInterval(loadAll,90000);
</script>
</body>
</html>
