<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Bracket</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0a4a;
  background-image: radial-gradient(ellipse at 50% 0%, #2d1580 0%, #1a0a4a 60%);
  color: #fff;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* DECORATIVE TOP BAR */
.deco-bar {
  height: 18px;
  background: repeating-linear-gradient(90deg,
    #f5c842 0px, #f5c842 20px,
    #e84040 20px, #e84040 40px,
    #3b82f6 40px, #3b82f6 60px,
    #22c55e 60px, #22c55e 80px,
    #f97316 80px, #f97316 100px,
    #a855f7 100px, #a855f7 120px
  );
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px 20px 14px;
  position: relative;
}
.header-title {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: clamp(24px, 5vw, 42px);
  letter-spacing: 3px;
  color: #f5c842;
  text-shadow: 0 0 30px rgba(245,200,66,0.4), 3px 3px 0 #7c3aed;
  line-height: 1;
}
.header-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(239,68,68,0.15); border: 1px solid #ef4444;
  border-radius: 4px; padding: 4px 12px; font-size: 10px;
  font-weight: 800; color: #ef4444; letter-spacing: 2px;
  text-transform: uppercase; margin-top: 8px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

/* TABS */
.tabs {
  display: flex; justify-content: center; gap: 4px;
  padding: 0 16px 14px; flex-wrap: wrap;
}
.tab {
  padding: 7px 20px; font-size: 11px; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.4); cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
  background: rgba(255,255,255,0.04); transition: all 0.2s;
}
.tab.active { color: #f5c842; border-color: #f5c842; background: rgba(245,200,66,0.08); }

.section { display: none; }
.section.active { display: block; }

/* UPDATE BAR */
.update-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; margin-bottom: 4px;
  background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.update-text { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
.refresh-btn {
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  color: #f5c842; background: rgba(245,200,66,0.1);
  border: 1px solid rgba(245,200,66,0.3); border-radius: 4px;
  padding: 4px 12px; cursor: pointer; text-transform: uppercase;
}

/* ===== BRACKET ===== */
.bracket-outer { padding: 12px 8px 20px; overflow-x: auto; }

.phase-label {
  text-align: center;
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 16px; letter-spacing: 3px; color: #f5c842;
  margin-bottom: 12px; text-transform: uppercase;
}

/* Symmetric bracket layout */
.bracket-layout {
  display: grid;
  grid-template-columns: 1fr 0.7fr 0.5fr 80px 0.5fr 0.7fr 1fr;
  gap: 0;
  min-width: 760px;
  align-items: center;
}

.round-col {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  gap: 8px;
  padding: 0 6px;
}

.round-title {
  text-align: center;
  font-size: 9px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: #f5c842;
  margin-bottom: 6px; opacity: 0.7;
}

/* Match card */
.match-card {
  background: rgba(89, 46, 203, 0.4);
  border: 1px solid rgba(245,200,66,0.25);
  border-radius: 8px; overflow: hidden;
  position: relative;
}
.match-card.future { opacity: 0.35; border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); }

.match-team {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; font-weight: 600;
}
.match-team:last-child { border-bottom: none; }
.match-team.tbd { color: rgba(255,255,255,0.2); font-style: italic; font-weight: 400; }

.flag-box {
  width: 28px; height: 20px;
  border-radius: 3px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  background: rgba(0,0,0,0.2);
}
.team-name { flex: 1; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* VS badge between teams */
.vs-badge {
  text-align: center; font-size: 8px; font-weight: 800;
  color: rgba(245,200,66,0.4); letter-spacing: 1px;
  padding: 1px 0; background: rgba(0,0,0,0.15);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

/* Empty slots */
.empty-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; overflow: hidden; opacity: 0.4;
}
.empty-row {
  display: flex; align-items: center; padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04); gap: 8px;
}
.empty-row:last-child { border-bottom: none; }
.empty-flag { width: 28px; height: 16px; background: rgba(255,255,255,0.06); border-radius: 3px; }
.empty-name { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; flex: 1; }

/* Center trophy */
.center-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px;
}
.trophy-icon { font-size: 42px; filter: drop-shadow(0 0 16px rgba(245,200,66,0.6)); }
.final-label {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 14px; letter-spacing: 2px; color: #f5c842; margin-top: 4px;
}
.final-match { margin-top: 8px; width: 100%; }

/* ===== GROUPS ===== */
.groups-section { padding: 12px 14px; }
.groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:500px){ .groups-grid { grid-template-columns: 1fr; } }

.group-card {
  background: rgba(89,46,203,0.25);
  border: 1px solid rgba(245,200,66,0.15);
  border-radius: 8px; overflow: hidden;
}
.group-header {
  padding: 7px 12px; font-size: 10px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase; color: #f5c842;
  background: rgba(245,200,66,0.08); border-bottom: 1px solid rgba(245,200,66,0.1);
}
.group-table { width: 100%; border-collapse: collapse; }
.group-table th { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 700; padding: 5px 10px; text-align: right; letter-spacing: 0.5px; }
.group-table th:first-child { text-align: left; }
.group-table td { padding: 6px 10px; font-size: 11px; text-align: right; border-top: 1px solid rgba(255,255,255,0.04); }
.group-table td:first-child { text-align: left; }
.team-cell { display: flex; align-items: center; gap: 5px; }
.rank { width: 14px; height: 14px; border-radius: 3px; font-size: 8px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.r1 { background: rgba(245,200,66,0.25); color: #f5c842; }
.r2 { background: rgba(34,197,94,0.15); color: #22c55e; }
.r3,.r4 { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }
.pts { font-weight: 800; }
.q-row { background: rgba(34,197,94,0.04); }

/* ===== SCORES ===== */
.scores-section { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.score-card {
  background: rgba(89,46,203,0.25); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 12px;
}
.score-card.live-g { border-color: rgba(239,68,68,0.4); }
.score-teams { flex: 1; }
.score-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.score-flag { font-size: 18px; }
.score-name { flex: 1; font-size: 13px; }
.score-name.w { font-weight: 700; }
.score-num { font-size: 18px; font-weight: 800; min-width: 18px; text-align: right; color: #f5c842; }
.score-sep { height: 1px; background: rgba(255,255,255,0.06); margin: 2px 0; }
.score-meta { text-align: right; }
.pill { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; }
.p-final { background: rgba(34,197,94,0.12); color: #22c55e; }
.p-live { background: rgba(239,68,68,0.12); color: #ef4444; animation: blink 1.5s infinite; }
.p-sched { background: rgba(245,200,66,0.08); color: #f5c842; }
.score-date { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; }

.loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); }
.spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.08); border-top-color: #f5c842; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }

.footer {
  text-align: center; padding: 14px;
  font-size: 10px; color: rgba(255,255,255,0.2);
  letter-spacing: 1px; text-transform: uppercase;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* BOTTOM DECO */
.deco-bar-bottom {
  height: 18px;
  background: repeating-linear-gradient(90deg,
    #a855f7 0px, #a855f7 20px,
    #f97316 20px, #f97316 40px,
    #22c55e 40px, #22c55e 60px,
    #3b82f6 60px, #3b82f6 80px,
    #e84040 80px, #e84040 100px,
    #f5c842 100px, #f5c842 120px
  );
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="deco-bar"></div>

<div class="header">
  <div class="header-title">🏆 Mundial 2026</div>
  <div class="header-sub">Bracket de Eliminatorias · Tiempo Real</div>
  <div><span class="live-badge"><span class="live-dot"></span>En Vivo</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('bracket',this)">⚽ Bracket</div>
  <div class="tab" onclick="showTab('grupos',this)">📊 Grupos</div>
  <div class="tab" onclick="showTab('partidos',this)">🔴 Partidos</div>
</div>

<div class="update-bar">
  <span class="update-text" id="upd-text">Cargando datos...</span>
  <button class="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
</div>

<!-- BRACKET -->
<div class="section active" id="tab-bracket">
  <div class="bracket-outer">
    <div class="phase-label" id="phase-label">🔮 Proyección · Octavos de Final</div>
    <div class="bracket-layout" id="bracket-layout">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Calculando clasificados...</div>
    </div>
  </div>
</div>

<!-- GRUPOS -->
<div class="section" id="tab-grupos">
  <div class="groups-section">
    <div class="groups-grid" id="groups-grid">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>
</div>

<!-- PARTIDOS -->
<div class="section" id="tab-partidos">
  <div class="scores-section" id="scores-list">
    <div class="loading"><div class="spinner"></div>Cargando...</div>
  </div>
</div>

<div class="footer" id="footer-txt">Datos actualizados automáticamente · Mundial 2026</div>
<div class="deco-bar-bottom"></div>

<script>
const FLAGS = {
  MEX:'🇲🇽',KOR:'🇰🇷',CZE:'🇨🇿',RSA:'🇿🇦',CAN:'🇨🇦',SUI:'🇨🇭',BIH:'🇧🇦',QAT:'🇶🇦',
  BRA:'🇧🇷',MAR:'🇲🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',HAI:'🇭🇹',USA:'🇺🇸',AUS:'🇦🇺',PAR:'🇵🇾',TUR:'🇹🇷',
  GER:'🇩🇪',CIV:'🇨🇮',ECU:'🇪🇨',CUW:'🇨🇼',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',
  EGY:'🇪🇬',IRN:'🇮🇷',BEL:'🇧🇪',NZL:'🇳🇿',ESP:'🇪🇸',URU:'🇺🇾',CPV:'🇨🇻',KSA:'🇸🇦',
  NOR:'🇳🇴',FRA:'🇫🇷',SEN:'🇸🇳',IRQ:'🇮🇶',ARG:'🇦🇷',AUT:'🇦🇹',JOR:'🇯🇴',ALG:'🇩🇿',
  COL:'🇨🇴',COD:'🇨🇩',POR:'🇵🇹',UZB:'🇺🇿',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',GHA:'🇬🇭',PAN:'🇵🇦',CRO:'🇭🇷',
};

let standings=[], scores=[], lastUp=null;

async function loadAll(){
  try {
    const [s,sc] = await Promise.all([fetch('/api/standings'),fetch('/api/scores')]);
    const sd=await s.json(), scd=await sc.json();
    if(sd.success) standings=sd.data;
    if(scd.success) scores=scd.data;
    lastUp=new Date(); render();
  } catch(e){ console.error(e); }
}

function ts(){ return lastUp?'Actualizado '+lastUp.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'';}

function render(){ renderBracket(); renderGroups(); renderScores(); document.getElementById('upd-text').textContent=ts(); document.getElementById('footer-txt').textContent=ts()+' · Mundial 2026'; }

function getG(){
  const g={};
  for(const t of standings){ if(!g[t.group])g[t.group]=[]; g[t.group].push(t); }
  for(const k in g) g[k].sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc));
  return g;
}

function matchCard(t1,t2,active){
  if(!active){
    return `<div class="empty-card">
      <div class="empty-row"><div class="empty-flag"></div><div class="empty-name"></div></div>
      <div class="empty-row"><div class="empty-flag"></div><div class="empty-name"></div></div>
    </div>`;
  }
  const r1 = t1 ? `<div class="match-team"><div class="flag-box">${FLAGS[t1.abbr]||'🏳'}</div><span class="team-name">${t1.name}</span></div>` : `<div class="match-team tbd"><div class="flag-box">🏳</div><span class="team-name">Por definir</span></div>`;
  const r2 = t2 ? `<div class="match-team"><div class="flag-box">${FLAGS[t2.abbr]||'🏳'}</div><span class="team-name">${t2.name}</span></div>` : `<div class="match-team tbd"><div class="flag-box">🏳</div><span class="team-name">Por definir</span></div>`;
  return `<div class="match-card"><div class="vs-badge">VS</div>${r1}${r2}</div>`;
}

function renderBracket(){
  const g=getG();
  const layout=document.getElementById('bracket-layout');

  // 8 matches per side in octavos
  const leftOct = [
    [g.A?.[0], g.B?.[1]],
    [g.C?.[0], g.D?.[1]],
    [g.E?.[0], g.F?.[1]],
    [g.G?.[0], g.H?.[1]],
  ];
  const rightOct = [
    [g.I?.[0], g.J?.[1]],
    [g.K?.[0], g.L?.[1]],
    [g.B?.[0], g.A?.[1]],
    [g.D?.[0], g.C?.[1]],
  ];

  const emptyQF = [[null,null],[null,null]];
  const emptySF = [[null,null]];

  function col(title, matches, active){
    return `<div class="round-col">
      <div class="round-title">${title}</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${matches.map(([t1,t2])=>`<div>${matchCard(t1,t2,active)}</div>`).join('')}
      </div>
    </div>`;
  }

  layout.innerHTML = `
    ${col('Octavos de Final', leftOct, true)}
    ${col('Cuartos de Final', emptyQF, false)}
    ${col('Semifinal', emptySF, false)}
    <div class="center-col">
      <div class="trophy-icon">🏆</div>
      <div class="final-label">Final</div>
      <div class="final-match">${matchCard(null,null,false)}</div>
    </div>
    ${col('Semifinal', emptySF, false)}
    ${col('Cuartos de Final', emptyQF, false)}
    ${col('Octavos de Final', rightOct, true)}
  `;
}

function renderGroups(){
  const g=getG();
  const c=document.getElementById('groups-grid');
  c.innerHTML='';
  for(const k of ['A','B','C','D','E','F','G','H','I','J','K','L']){
    if(!g[k])continue;
    const card=document.createElement('div');
    card.className='group-card';
    card.innerHTML=`<div class="group-header">Grupo ${k}</div>
      <table class="group-table">
        <thead><tr><th>Equipo</th><th>PJ</th><th>Pts</th><th>GD</th></tr></thead>
        <tbody>${g[k].map((t,i)=>`
          <tr class="${i<2?'q-row':''}">
            <td><div class="team-cell">
              <div class="rank r${i+1}">${i+1}</div>
              <span>${FLAGS[t.abbr]||'🏳'}</span>
              <span>${t.name}</span>
            </div></td>
            <td>${t.w+t.d+t.l}</td>
            <td class="pts">${t.pts}</td>
            <td style="color:${(t.gf-t.gc)>0?'#22c55e':(t.gf-t.gc)<0?'#ef4444':'rgba(255,255,255,0.3)'}">${t.gf-t.gc>0?'+':''}${t.gf-t.gc}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    c.appendChild(card);
  }
}

function renderScores(){
  const c=document.getElementById('scores-list');
  c.innerHTML='';
  const all=[...scores.filter(s=>s.status==='live'),...scores.filter(s=>s.status==='final'),...scores.filter(s=>s.status==='scheduled')];
  if(!all.length){c.innerHTML='<div class="loading">Sin partidos</div>';return;}
  for(const m of all){
    const wH=m.status==='final'&&m.sH>m.sA, wA=m.status==='final'&&m.sA>m.sH;
    const isL=m.status==='live', isS=m.status==='scheduled';
    const pill=m.status==='final'?'p-final':isL?'p-live':'p-sched';
    const label=m.status==='final'?'Final':isL?'En vivo':'Próximo';
    const card=document.createElement('div');
    card.className='score-card'+(isL?' live-g':'');
    card.innerHTML=`<div class="score-teams">
      <div class="score-row"><span class="score-flag">${FLAGS[m.homeAbbr]||'🏳'}</span><span class="score-name${wH?' w':''}">${m.home}</span><span class="score-num">${isS?'':m.sH}</span></div>
      <div class="score-sep"></div>
      <div class="score-row"><span class="score-flag">${FLAGS[m.awayAbbr]||'🏳'}</span><span class="score-name${wA?' w':''}">${m.away}</span><span class="score-num">${isS?'':m.sA}</span></div>
    </div>
    <div class="score-meta"><span class="pill ${pill}">${label}</span><div class="score-date">${m.date}</div></div>`;
    c.appendChild(card);
  }
}

function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

loadAll();
setInterval(loadAll,90000);
</script>
</body>
</html>
